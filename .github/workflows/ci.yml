name: CI

on:
  push:
  pull_request:

jobs:
  build-fastapi:
    name: FastAPI CI

    runs-on: ubuntu-latest

    # Deterministic CI-local values (no repo secrets needed) — the Postgres
    # service below provides the database.
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5433/testdatabase
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5433/testdatabase
      ACCESS_SECRET_KEY: ci-access-secret-key-with-at-least-32-chars
      RESET_PASSWORD_SECRET_KEY: ci-reset-password-secret-with-at-least-32-chars
      VERIFICATION_SECRET_KEY: ci-verification-secret-with-at-least-32-chars
      CORS_ORIGINS: '["http://localhost:5173"]'

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testdatabase
        ports:
          - 5433:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install the project
        working-directory: ./backend
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        working-directory: ./backend
        run: uv run ruff check .

      - name: Type check (ty)
        working-directory: ./backend
        run: |
          set -o pipefail
          output=$(uv run ty check . 2>&1)
          echo "$output"
          if echo "$output" | grep -q "^error\["; then exit 1; fi

      - name: Run tests with coverage
        working-directory: ./backend
        run: uv run pytest --cov=src --cov-report=xml --cov-report=term

  build-frontend:
    name: Frontend CI (Vite)

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Node dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Lint (Biome)
        working-directory: ./frontend
        run: pnpm run lint

      - name: Type check
        working-directory: ./frontend
        run: pnpm run typecheck

      - name: Unit tests
        working-directory: ./frontend
        run: pnpm run test

      - name: Build
        working-directory: ./frontend
        run: pnpm run build

  e2e-tests:
    name: Playwright E2E
    needs: [build-fastapi, build-frontend]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testdatabase
        ports:
          - 5433:5432
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5433/testdatabase
      TEST_DATABASE_URL: postgresql://postgres:password@localhost:5433/testdatabase
      ACCESS_SECRET_KEY: test-access-secret
      RESET_PASSWORD_SECRET_KEY: test-reset-secret
      VERIFICATION_SECRET_KEY: test-verification-secret
      CORS_ORIGINS: '["http://127.0.0.1:5173","http://localhost:5173"]'
      VITE_API_BASE_URL: http://127.0.0.1:8000
      PLAYWRIGHT_API_BASE_URL: http://127.0.0.1:8000
      # Parallel Playwright workers share one IP; don't let rate limiting flake.
      RATE_LIMIT_ENABLED: "false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Node dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: pnpm exec playwright install --with-deps

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        working-directory: ./backend
        run: uv sync --all-extras --dev

      - name: Run database migrations
        working-directory: ./backend
        run: uv run alembic upgrade head

      # Backend, readiness wait, and Playwright all run in ONE step so the
      # backgrounded server reliably survives for the whole run. wait-on has a
      # finite timeout (it defaults to infinite), and the backend log is dumped
      # on failure so a startup error never turns into a multi-hour hang.
      - name: Run E2E tests (backend + Playwright)
        working-directory: ./backend
        run: |
          set +e  # capture statuses and dump logs instead of failing fast
          uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          BACKEND_PID=$!

          # http-get:// makes wait-on use GET; plain http:// uses HEAD, which
          # FastAPI's @app.get("/health") rejects with 405.
          npx --yes wait-on -t 90000 http-get://127.0.0.1:8000/health
          if [ $? -ne 0 ]; then
            echo "::error::Backend did not become ready within 90s"
            echo "----- backend.log -----"
            cat backend.log
            kill "$BACKEND_PID" 2>/dev/null
            exit 1
          fi

          cd ../frontend
          pnpm run test:e2e
          status=$?

          kill "$BACKEND_PID" 2>/dev/null
          exit $status
