fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=3000"]
        exclude: >
          (?x)^(
              package-lock\.json
          )$
      - id: fix-byte-order-marker
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: debug-statements
      - id: detect-private-key

  # Gitleaks - Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.14.4
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
      # Run the formatter.
      - id: ruff-format

  # ty type checker (local hook until official pre-commit hook is released)
  # See: https://github.com/astral-sh/ty/issues/269
  # Note: Only fails on errors, not warnings (warnings are configured in pyproject.toml)
  - repo: local
    hooks:
      - id: ty
        name: ty type check
        entry: bash -c 'cd backend && output=$(uv run ty check . 2>&1); echo "$output"; if echo "$output" | grep -q "^error\["; then exit 1; fi'
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false

  - repo: local
    hooks:
      - id: frontend-lint
        name: run frontend lint
        entry: bash -c 'cd frontend && pnpm biome lint --write ./src'
        language: system
        types: [ file ]
        files: ^frontend/src/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false
      - id: frontend-format
        name: Run format on frontend files
        entry: bash -c 'cd frontend && pnpm biome format --write ./src'
        language: system
        types: [ file ]
        files: ^frontend/src/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false
      - id: frontend-typecheck
        name: run frontend typecheck
        entry: sh -c 'cd frontend && pnpm run typecheck'
        language: system
        types: [ file ]
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
      - id: check-migration-heads
        name: check for multiple migration heads
        entry: bash -c 'cd backend && HEAD_COUNT=$(uv run alembic heads | wc -l | tr -d " "); if [ "$HEAD_COUNT" -gt 1 ]; then echo "ERROR - Multiple alembic heads detected. Run - uv run alembic merge -m merge-migrations heads"; exit 1; fi'
        language: system
        # Run when migration files change
        files: ^backend/alembic_migrations/versions/.*\.py$
        pass_filenames: false
      - id: generate-openapi-schema
        name: generate OpenAPI schema
        entry: sh -c 'cd backend && uv run python -m commands.generate_openapi_schema'
        language: system
        # Only run OpenAPI schema generation if schemas.py, main.py or package version have changed:
        files: (main\.py$|schemas\.py$|pyproject\.toml)
        pass_filenames: false
      - id: generate-frontend-client
        name: generate frontend client
        entry: sh -c 'cd frontend && pnpm run generate-client'
        language: system
        # Only run frontend client generation if frontend files have changed:
        files: openapi\.json$
        pass_filenames: false
      - id: backend-tests
        name: run backend unit tests
        entry: bash -c 'cd backend && uv run pytest -m "not integration"'
        language: system
        types: [file]
        files: ^backend/.*\.py$
        pass_filenames: false
      - id: frontend-tests
        name: run frontend unit tests
        entry: bash -c 'cd frontend && pnpm test'
        language: system
        types: [file]
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false