services:
  backend:
    build:
      context: backend
    environment:
      # Write OpenAPI schema directly into the frontend dir (mounted below),
      # so the frontend's openapi-ts generator picks it up at the same path
      # whether you run natively or via docker.
      - OPENAPI_OUTPUT_FILE=/frontend/openapi.json
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/mydatabase
      - TEST_DATABASE_URL=postgresql+asyncpg://postgres:password@db_test:5432/testdatabase
      - MAIL_SERVER=mailhog
      # Browser-facing frontend origin (used for CORS + OAuth redirects).
      - FRONTEND_URL=http://localhost:5173
    ports:
      - "8000:8000"
    networks:
      - my_network
    volumes:
      - ./backend:/app
      - fastapi-venv:/app/.venv
      - ./frontend:/frontend
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    networks:
      - my_network
    volumes:
      - "${DB_VOLUME_NAME:-postgres_data}:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  db_test:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: testdatabase
    ports:
      - "5433:5432"
    networks:
      - my_network
  frontend:
    build:
      context: ./frontend
    user: node
    ports:
      - "5173:5173"
    networks:
      - my_network
    environment:
      NODE_ENV: development
      # The browser (not the container) makes API calls, so this points at the
      # host-exposed backend, not the compose service name.
      VITE_API_BASE_URL: http://localhost:8000
      PORT: "5173"
      # Path the openapi watcher tracks (the backend writes the schema here via
      # the /frontend mount); avoids depending on a mounted .env.local.
      OPENAPI_OUTPUT_FILE: openapi.json
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI
    networks:
      - my_network

volumes:
  postgres_data:
  frontend-node-modules:
  fastapi-venv:

networks:
  my_network:
    driver: bridge
