server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: client-side routes (e.g. /dashboard) have no file on disk,
    # so serve index.html and let TanStack Router resolve the path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the HTML entry point, so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
