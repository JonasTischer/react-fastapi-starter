server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers (apply to every response) ──────────────────────────
    # Tighten the CSP to your real API/asset origins. connect-src must include
    # the backend (VITE_API_BASE_URL) and any error-tracking endpoint (Sentry).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Hashed build assets are immutable — cache them aggressively. Using the
    # `expires` directive (not add_header) preserves the security headers above.
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # SPA fallback: client-side routes (e.g. /dashboard) have no file on disk,
    # so serve index.html and let TanStack Router resolve the path.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
